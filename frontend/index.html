<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#FF5A5F" />

    <!-- Per-role manifest: the admin's home-screen icon reopens /admin, the
         member's reopens /. Injected before the browser computes installability. -->
    <script>
      (function () {
        var isAdmin = location.pathname.replace(/\/+$/, '') === '/admin';
        var link = document.createElement('link');
        link.rel = 'manifest';
        link.href = isAdmin ? '/manifest.admin.json' : '/manifest.json';
        document.head.appendChild(link);
      })();
    </script>

    <!-- iOS standalone ("Add to Home Screen" behaves like a native app) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="162" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <title>本周计划</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #f7f7f7;
        /* Keep content clear of the notch / home indicator when installed. */
        padding-bottom: env(safe-area-inset-bottom);
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
